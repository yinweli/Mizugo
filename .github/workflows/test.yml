name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest] # 由於要使用到 Docker 來執行 Redis 跟 Mongo, 所以只能測試 Linux了
        go: [1.25.x]
        proto: [3.x]
        redis: [6]
        mongo: ["6.0"]
    name: ${{ matrix.os }} | go ${{ matrix.go }} | proto ${{ matrix.proto }} | redis ${{ matrix.redis }} | mongo ${{ matrix.mongo }}
    runs-on: ${{ matrix.os }}
    steps:
      - name: checkout
        uses: actions/checkout@v6
      - name: setup go ${{ matrix.go }}
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
      - name: setup protoc
        uses: arduino/setup-protoc@v1
        with:
          version: ${{ matrix.proto }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: setup protoc-go
        run: go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
      - name: setup redis
        uses: supercharge/redis-github-action@1.8.1
        with:
          redis-version: ${{ matrix.redis }}
      - name: setup mongo
        uses: supercharge/mongodb-github-action@1.12.1
        with:
          mongodb-version: ${{ matrix.mongo }}
      - name: test
        run: |
          go test -coverprofile=coverage.txt -covermode=atomic $(go list ./... | grep -v "support")
      - name: upload coverage to Codecov
        uses: codecov/codecov-action@v5
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          fail_ci_if_error: true
