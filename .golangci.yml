version: "2"

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/yinweli/Mizugo/v2
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$

linters:
  default: none
  enable:
    - bodyclose
    - copyloopvar
    - dogsled
    - dupl
    - errcheck
    - exhaustive
    - funlen
    - gochecknoinits
    - goconst
    - gocritic
    - gocyclo
    - goprintffuncname
    - gosec
    - govet
    - ineffassign
    - lll
    - misspell
    - mnd
    - nakedret
    - noctx
    - nolintlint
    - rowserrcheck
    - staticcheck
    - unconvert
    - unparam
    - unused
    - whitespace
    - wrapcheck
  settings:
    dupl:
      threshold: 400
    dogsled:
      max-blank-identifiers: 4
    funlen:
      lines: 200
      statements: 150
    goconst:
      min-len: 2
      min-occurrences: 4
    gocritic:
      enabled-tags:
        - diagnostic
        - experimental
        - opinionated
        - performance
        - style
      disabled-checks:
        - dupImport
        - ifElseChain
        - octalLiteral
        - whyNoLint
        - wrapperFunc
      settings:
        hugeParam:
          sizeThreshold: 100
    gocyclo:
      min-complexity: 50
    mnd:
      checks:
        - argument
        - case
        - condition
        - return
      ignored-numbers:
        - "0"
        - "1"
        - "2"
        - "3"
        - "4"
        - "5"
      ignored-functions:
        - strings.SplitN
        - strconv.FormatFloat
        - strconv.FormatInt
        - strconv.FormatUint
        - strconv.ParseFloat
        - strconv.ParseInt
        - strconv.ParseUint
    lll:
      line-length: 300
    misspell:
      locale: US
    nolintlint:
      allow-unused: false
      require-explanation: false
      require-specific: false
    staticcheck:
      checks: ["all", "-SA1019", "-ST1006", "-S1002", "-ST1003"]
    whitespace:
      multi-func: true
    wrapcheck:
      ignore-sigs:
        - .Errorf(
        - errors.New(
        - errors.Unwrap(
        - .Wrap(
        - .Wrapf(
        - .WithMessage(
        - .WithMessagef(
        - .WithStack(
      ignore-sig-regexps:
        - \.New.*Error\(
      ignore-package-globs:
        - encoding/*
        - github.com/pkg/*
        - golang.org/x/sync/singleflight
    gosec:
      excludes:
        - G101
        - G115
        - G117
        - G401
        - G405
        - G501
        - G502
        - G503
  exclusions:
    generated: lax
    presets:
      - comments
      - std-error-handling
      - common-false-positives
    paths:
      - .idea
      - third_party$
      - builtin$
      - examples$
    rules:
      - path: (.+)_test.go
        linters:
          - mnd
          - dupl
          - funlen
          - goconst
      - path: pkg/golinters/errcheck.go
        text: "SA1019: errCfg.Exclude is deprecated: use ExcludeFunctions instead"
      - path: pkg/commands/run.go
        text: "SA1019: lsc.Errcheck.Exclude is deprecated: use ExcludeFunctions instead"
      - path: pkg/commands/run.go
        text: "SA1019: e.cfg.Run.Deadline is deprecated: Deadline exists for historical compatibility and should not be used."
      - path: pkg/golinters/gofumpt.go
        text: "SA1019: settings.LangVersion is deprecated: use the global `run.go` instead."
      - path: pkg/golinters/staticcheck_common.go
        text: "SA1019: settings.GoVersion is deprecated: use the global `run.go` instead."
      - path: pkg/lint/lintersdb/manager.go
        text: "SA1019: (.+).(GoVersion|LangVersion) is deprecated: use the global `run.go` instead."
      - path: (.+)\.go$
        text: declaration of "(err|ctx)" shadows declaration at
      - path: (.+)\.go$
        text: G306
      - path: (.+)\.go$
        text: "mnd: Magic number: 0644"
      - linters:
          - goconst
        path: (.+)_test\.go
